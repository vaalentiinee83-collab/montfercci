<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONTFERCCI Paris</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --noir: #1a1a1a; --blanc: #ffffff; --gris: #888888; --gris-clair: #cccccc; }
  html, body { min-height: 100%; background: var(--blanc); color: var(--noir); font-family: "Montserrat", sans-serif; font-weight: 300; }
  .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 24px 48px; }
  .logo-block { text-align: center; margin-bottom: 10px; margin-top: -60px; animation: fadeUp 1s ease forwards; opacity: 0; }
  .logo-img { width: clamp(200px, 42vw, 340px); display: block; margin: 0 auto; }
  .tagline { font-family: "Lora", serif; font-weight: 400; font-style: italic; font-size: clamp(0.75rem, 1.8vw, 0.95rem); letter-spacing: 0.12em; color: var(--noir); margin-bottom: 160px; animation: fadeUp 1s 0.15s ease forwards; opacity: 0; }
  .center-block { width: 100%; max-width: 500px; text-align: center; animation: fadeUp 1s 0.3s ease forwards; opacity: 0; }
  .btn-decouvrir { display: inline-block; width: auto; background: var(--noir); border: 1px solid var(--noir); color: var(--blanc); font-family: "Montserrat", sans-serif; font-weight: 300; font-size: 0.62rem; letter-spacing: 0.38em; text-transform: uppercase; padding: 16px 40px; cursor: pointer; transition: background 0.3s, color 0.3s; text-indent: 0.38em; text-decoration: none; }
  .btn-decouvrir:hover { background: var(--blanc); color: var(--noir); }
  .ou-sep { display: flex; align-items: center; gap: 20px; margin: 36px 0; }
  .ou-sep::before, .ou-sep::after { content: ""; flex: 1; height: 1px; background: var(--gris-clair); }
  .ou-sep span { font-family: "Montserrat", sans-serif; font-weight: 300; font-size: 0.6rem; letter-spacing: 0.3em; color: var(--gris); text-transform: uppercase; text-indent: 0.3em; }
  .membres-label { font-family: "Montserrat", sans-serif; font-weight: 600; font-size: 0.62rem; letter-spacing: 0.38em; text-transform: uppercase; color: var(--noir); margin-bottom: 32px; text-indent: 0.38em; }
  .field-wrap { position: relative; width: 100%; margin-bottom: 16px; }
  .field-label { display: block; font-family: "Montserrat", sans-serif; font-weight: 300; font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--noir); margin-bottom: 14px; text-align: left; text-indent: 0.3em; }
  .code-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--noir); padding: 12px 0 14px; font-family: "Montserrat", sans-serif; font-weight: 300; font-size: 0.78rem; letter-spacing: 0.28em; color: var(--noir); text-transform: uppercase; outline: none; caret-color: var(--noir); }
  .code-input::placeholder { color: var(--gris-clair); letter-spacing: 0.28em; }
  .btn-access { display: inline-block; width: auto; background: transparent; border: 1px solid var(--noir); color: var(--noir); font-family: "Montserrat", sans-serif; font-weight: 300; font-size: 0.62rem; letter-spacing: 0.38em; text-transform: uppercase; padding: 16px 40px; cursor: pointer; transition: background 0.3s, color 0.3s; text-indent: 0.38em; margin-top: 24px; }
  .btn-access:hover { background: var(--noir); color: var(--blanc); }
  .error-msg { margin-top: 18px; font-size: 0.6rem; letter-spacing: 0.22em; color: var(--gris); text-transform: uppercase; opacity: 0; transition: opacity 0.4s; min-height: 1em; text-indent: 0.22em; }
  .error-msg.visible { opacity: 1; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
</style>
</head>

    <p class="error-msg" id="errorMsg">Code invalide — veuillez vérifier votre email</p>
  </div>
</div>
<script>
  const input = document.getElementById("codeInput");
  input.addEventListener("input", () => { const pos = input.selectionStart; input.value = input.value.toUpperCase(); input.setSelectionRange(pos, pos); });
  input.addEventListener("keydown", e => { if (e.key === "Enter") handleAccess(); });
  const MEMBERSHIP_API_URL = "REMPLACER_PAR_VOTRE_URL_APPS_SCRIPT";
  function handleAccess() {
    const code = input.value.trim().toUpperCase();
    const errorEl = document.getElementById("errorMsg");
    if (!code) { showError("Veuillez entrer votre code d'accès"); return; }

    if (!MEMBERSHIP_API_URL || MEMBERSHIP_API_URL.indexOf("REMPLACER") !== -1) {
      showError("Configuration en cours, réessayez plus tard.");
      return;
    }

    errorEl.textContent = "Vérification…"; errorEl.style.color = "#888"; errorEl.classList.add("visible");

    fetch(MEMBERSHIP_API_URL + "?action=verify&code=" + encodeURIComponent(code))
      .then(res => res.json())
      .then(data => {
        if (data.valid) {
          errorEl.textContent = "Bienvenue."; errorEl.style.color = "#1a1a1a"; errorEl.classList.add("visible");
          setTimeout(() => { window.location.href = "vitrine.html"; }, 1200);
        } else {
          showError("Code invalide — veuillez vérifier votre email");
          input.style.animation = "shake 0.4s ease"; setTimeout(() => input.style.animation = "", 400);
        }
      })
      .catch(() => { showError("Erreur de connexion, réessayez."); });
  }
  function showError(msg) {
    const el = document.getElementById("errorMsg"); el.textContent = msg; el.style.color = "#888";
    el.classList.add("visible"); setTimeout(() => el.classList.remove("visible"), 3500);
  }
<\/script>
</body>
</html>
