<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONTFERCCI Paris — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --noir:#ffffff;--creme:#0a0a0a;--or:#333333;--gris:#888;--blanc:#f7f5f2;
}
html{scroll-behavior:smooth}
body{background:#fff;color:#0a0a0a;font-family:'Lora',serif;font-weight:300;overflow-x:hidden;cursor:none}

.cursor{position:fixed;width:8px;height:8px;background:#333333;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%) }
.cursor-ring{position:fixed;width:32px;height:32px;border:1px solid #333333;border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .15s ease;opacity:.5}

header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:12px 48px;display:flex;align-items:center;justify-content:center;
  border-bottom:1px solid rgba(51,51,51,.15);
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);
  animation:slideDown .8s ease forwards;
}
.logo-link{text-decoration:none;display:flex;flex-direction:column;align-items:center;justify-content:center}
.logo-img{height:80px;width:auto;display:block}
.logo-tagline{display:block;font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.2em;color:#555;margin-top:4px}

/* CONFIGURATEUR */
.hero{padding-top:120px;min-height:100vh;display:flex;flex-direction:column;align-items:center}

.configurateur{
  width:260px;margin:0 auto;
  position:relative;z-index:3;
  padding-top:20px;
  padding-left:0;padding-right:0;
  touch-action:pan-y;
}

.piece-row{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:visible;
  touch-action:pan-y;
}
.piece-row.row-tie    {height:88px}
.piece-row.row-jacket {height:185px;margin-top:12px}
.piece-row.row-pants  {height:225px;margin-top:18px}

/* 3D scene */
.scene{
  perspective:600px;
  perspective-origin:50% 50%;
  width:100%;height:100%;
  position:relative;
}
.ring{
  width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform 2.2s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.rslide{
  position:absolute;
  width:145px;height:100%;
  left:50%;
  transform-origin:center center;
}
.rslide img{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none}

/* Couleurs */
.couleurs{text-align:center;margin-top:18px;position:relative;z-index:3}
.couleurs-label{font-size:.58rem;letter-spacing:.4em;text-transform:uppercase;color:#0a0a0a;margin-bottom:12px}
.couleurs-swatches{display:flex;justify-content:center;gap:14px}
.swatch{width:22px;height:22px;border-radius:50%;border:1.5px solid transparent;cursor:none;padding:0;transition:transform .2s,border-color .2s}
.swatch:hover{transform:scale(1.15)}
.swatch.active{border-color:#0a0a0a;outline:2px solid rgba(10,10,10,.18);outline-offset:2px}
.swatch[data-color="creme"]{border-color:rgba(10,10,10,.2)}
.swatch[data-color="creme"].active{border-color:#0a0a0a}

/* Arrows — fixes sur les côtés du configurateur */
.arrows-fixed {
  position:absolute;
  top:0; bottom:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-around;
  z-index:20;
  gap:0;
}
.arrows-fixed.left  { left:-36px; }
.arrows-fixed.right { right:-36px; }

.piece-arr{
  background:none;border:none;
  color:rgba(51,51,51,.4);font-size:1rem;
  cursor:none;padding:8px 6px;
  transition:color .2s,transform .15s;
  line-height:1;display:block;
}
.piece-arr:hover{color:#0a0a0a;transform:scale(1.35)}

/* Accroche */
.accroche{text-align:center;padding:28px 24px 6px;position:relative;z-index:3;animation:fadeUp 1.1s .6s ease both}
.accroche p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1.3rem,3vw,1.9rem);font-weight:300;letter-spacing:.04em;color:#0a0a0a;line-height:1.4}
.accroche p em{color:#0a0a0a;font-style:normal}
.tagline{text-align:center;margin-bottom:10px;animation:fadeUp 1.1s .8s ease both}
.tagline p{font-size:.6rem;letter-spacing:.4em;color:#0a0a0a;text-transform:uppercase}

/* Formulaire */
.inscription-section{padding:36px 24px 48px;max-width:480px;margin:0 auto;position:relative;z-index:3;animation:fadeUp 1.1s 1s ease both}
.inscription-titre{font-size:.6rem;letter-spacing:.4em;color:#0a0a0a;text-transform:uppercase;text-align:center;margin-bottom:22px}
.form-group{margin-bottom:14px}
.form-group input{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(51,51,51,.25);padding:12px 0;font-family:'Montserrat',sans-serif;font-size:.75rem;font-weight:300;letter-spacing:.12em;color:#0a0a0a;outline:none;transition:border-color .3s}
.form-group input::placeholder{color:#0a0a0a;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase}
.form-group input:focus{border-bottom-color:#0a0a0a}
.rgpd-row{display:flex;align-items:flex-start;gap:12px;margin:18px 0 26px}
.rgpd-row input[type=checkbox]{appearance:none;-webkit-appearance:none;width:14px;height:14px;border:1px solid rgba(51,51,51,.5);margin-top:2px;flex-shrink:0;cursor:none;transition:all .2s;position:relative}
.rgpd-row input[type=checkbox]:checked{background:#000000;border-color:#000000}
.rgpd-row input[type=checkbox]:checked::after{content:'✓';position:absolute;top:-2px;left:1px;font-size:10px;color:#fff}
.rgpd-row label{font-size:.64rem;letter-spacing:.06em;color:#0a0a0a;line-height:1.6;cursor:none}
.btn-submit{width:100%;background:transparent;border:1px solid #333333;color:#0a0a0a;padding:16px 32px;font-family:'Montserrat',sans-serif;font-size:.65rem;font-weight:300;letter-spacing:.45em;text-transform:uppercase;cursor:none;transition:all .4s cubic-bezier(.77,0,.175,1);position:relative;overflow:hidden}
.btn-submit::before{content:'';position:absolute;inset:0;background:#333333;transform:translateX(-101%);transition:transform .4s cubic-bezier(.77,0,.175,1);z-index:-1}
.btn-submit:hover::before{transform:translateX(0)}
.btn-submit:hover{color:#fff}
.confirmation-msg{display:none;text-align:center;padding:20px}
.confirmation-msg p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:#0a0a0a;letter-spacing:.06em}

/* Footer */
footer{border-top:1px solid rgba(51,51,51,.12);padding:36px 48px 32px;display:flex;flex-direction:column;align-items:center;gap:22px;animation:fadeIn 1.2s 1.2s ease both}
.footer-label{font-size:.6rem;letter-spacing:.4em;color:#0a0a0a;text-transform:uppercase;text-align:center}
.social-links{display:flex;gap:28px;align-items:center}
.social-link{display:flex;align-items:center;justify-content:center;width:44px;height:44px;border:1px solid rgba(51,51,51,.25);border-radius:50%;color:#0a0a0a;text-decoration:none;transition:all .3s;cursor:none}
.social-link:hover{border-color:#0a0a0a;color:#0a0a0a;transform:translateY(-2px)}
.social-link svg{width:18px;height:18px}
.footer-bottom{font-size:.56rem;letter-spacing:.2em;color:#0a0a0a;text-transform:uppercase}

@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:480px){
  .configurateur{width:300px}
  .piece-row.row-tie    {height:86px}
  .piece-row.row-jacket {height:188px;margin-top:0px}
  .piece-row.row-pants  {height:230px;margin-top:0px}
  .rslide{width:156px}
}

.configurateur{animation:fadeUp 1.1s .3s ease both}
</style>
</head>

// Curseur
const cursor = document.getElementById('cursor');
const cursorRing = document.getElementById('cursorRing');
let mouseX=0,mouseY=0,ringX=0,ringY=0;
document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;cursor.style.left=mouseX+'px';cursor.style.top=mouseY+'px'});
(function animRing(){ringX+=(mouseX-ringX)*.12;ringY+=(mouseY-ringY)*.12;cursorRing.style.left=ringX+'px';cursorRing.style.top=ringY+'px';requestAnimationFrame(animRing)})();
document.querySelectorAll('button,a,input,label').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cursorRing.style.transform='translate(-50%,-50%) scale(1.5)';cursorRing.style.opacity='1'});
  el.addEventListener('mouseleave',()=>{cursorRing.style.transform='translate(-50%,-50%) scale(1)';cursorRing.style.opacity='.5'});
});

const N=3, R=window.innerWidth<=480?60:135;
const st={tie:0,jacket:0,pants:0};
const ang={tie:0,jacket:0,pants:0};

function build(piece){
  const ring=document.getElementById('ring-'+piece);
  ring.innerHTML='';
  for(let i=0;i<N;i++){
    const div=document.createElement('div');
    div.className='rslide';
    div.style.transform=`translateX(-50%) rotateY(${(360/N)*i}deg) translateZ(${R}px)`;
    const img=document.createElement('img');
    img.src='data:image/png;base64,'+IMGS[piece][i];
    div.appendChild(img);
    ring.appendChild(div);
  }
}

function updateOpacities(piece) {
  const ring = document.getElementById('ring-' + piece);
  const slides = ring.querySelectorAll('.rslide');
  slides.forEach((slide, i) => {
    // Angle of this slide relative to front (0 = facing viewer)
    const slideDeg = (360 / N) * i;
    // Current ring rotation
    const ringDeg  = ang[piece];
    // Effective angle mod 360
    let eff = (slideDeg + ringDeg) % 360;
    if (eff < 0) eff += 360;
    // eff=0 → front (opacity 1), eff=120 or 240 → side (opacity 0.22)
    // Use cosine: cos(0)=1, cos(120°)=-0.5 → map to [0.18, 1]
    const rad = eff * Math.PI / 180;
    const cos = Math.cos(rad);
    // map cos [-1,1] → [0.12, 1]
    const opacity = 0.12 + (cos + 1) / 2 * 0.88;
    // scale: front=1, sides=0.75
    const scale = 0.75 + (cos + 1) / 2 * 0.25;
    slide.style.opacity = opacity.toFixed(3);
    slide.style.transform = `translateX(-50%) rotateY(${slideDeg}deg) translateZ(${R}px) scale(${scale.toFixed(3)})`;
  });
}

function go(piece, idx) {
  const prev = st[piece];
  st[piece] = ((idx % N) + N) % N;
  let d = st[piece] - prev;
  if (d >  N / 2) d -= N;
  if (d < -N / 2) d += N;
  ang[piece] -= d * (360 / N);
  document.getElementById('ring-' + piece).style.transform = `rotateY(${ang[piece]}deg)`;
  // Animate opacities after transition
  setTimeout(() => updateOpacities(piece), 50);
  // Also update during transition
  const start = performance.now();
  const duration = 650;
  const startAng = ang[piece] + d * (360 / N);
  const endAng   = ang[piece];
  function frame(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    ang[piece] = startAng + (endAng - startAng) * ease;
    updateOpacities(piece);
    if (t < 1) requestAnimationFrame(frame);
    else ang[piece] = endAng;
  }
  requestAnimationFrame(frame);
}

function next(p){go(p,st[p]+1)}
function prev(p){go(p,st[p]-1)}

['tie','jacket','pants'].forEach(p => { build(p); updateOpacities(p); });

// Swipe
['tie','jacket','pants'].forEach(piece=>{
  const row=document.querySelector('#ring-'+piece).closest('.piece-row');
  let sx=0,drag=false;
  let sy=0;
  row.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
  row.addEventListener('touchmove',e=>{const dx=e.touches[0].clientX-sx;const dy=e.touches[0].clientY-sy;if(Math.abs(dx)>Math.abs(dy))e.preventDefault();},{passive:false});
  row.addEventListener('touchend',e=>{const dx=sx-e.changedTouches[0].clientX;if(Math.abs(dx)>30)dx>0?next(piece):prev(piece)});
  row.addEventListener('mousedown',e=>{drag=true;sx=e.clientX});
  row.addEventListener('mouseup',e=>{if(!drag)return;drag=false;const dx=sx-e.clientX;if(Math.abs(dx)>20)dx>0?next(piece):prev(piece)});
  row.addEventListener('mouseleave',()=>drag=false);
});

}
